{% extends 'User/Header.html' %}
{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<style>
    .par-card {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .head-sec {
        width: 840px;
        background-color: #6c8cfc;
        padding: 17px;
        border-radius: 10px;
        border-bottom: 1px solid white;
        margin-left: 8px;
        margin-top: 8px;
        display: flex;
        gap: 10px;
    }

    .content {
        display: flex;
        gap: 10px;
        width: 840px;
    }

    .option {
        color: white;
        font-size: 20px;
    }

    .option-content {
        width: 115px;
        padding: 10px;
        background-color: #90caf9;
        border-radius: 10px;
        position: absolute;
        left: 1036px;
        margin-top: 4px;
        display: none;
        transition: transform 3.9s ease-in-out;
    }

    .option-selection {
        display: flex;
        gap: 5px;
        flex-direction: column;
        align-items: center;
    }

    .con-card {
        width: 840px;
        padding: 24px;
        border-radius: 10px;
        background-color: transparent;
        min-height: 520px;
    }

    .message-card {
        padding: 24px;
        /* border-radius: 10px; */
        border-top: 1px solid white;
    }

    .message-box {
        padding: 10px;
        width: 750px;
        margin-left: 5px;
        border: none;
        background-color: #F5F5F5;
        border-radius: 10px;
    }

    .chat-card {
        /* background-color: #3f32f41c; */
        padding: 10px;
        box-shadow: 0 0 33px;
        border-radius: 10px;
    }

    .btn {
        background-color: transparent;
        border: none;
    }

    .ic-size {
        font-size: 20px;
        color: #6c8cfc;
    }

    .font {
        color: white;
        font-size: 20px;
        font-family: Poor Richard;
    }

    .r-mess {
        padding: 5px;
        background-color: #BBDEFB;
        border-radius: 10px;
        max-width: 555px;
        width: fit-content;
    }

    .s-mess {
        padding: 5px;
        background-color: #90caf9;
        border-radius: 10px;
        max-width: 555px;
        width: fit-content;
    }

    .par-r-mess {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding-bottom: 5px;
    }

    .par-s-mess {
        display: flex;
        flex-direction: column;
        padding-bottom: 5px;
        align-items: flex-end;
    }

    .s-time {
        padding: 2px;
        font-size: 9px;
        display: flex;
        justify-content: flex-end;
    }

    .r-time {
        padding: 2px;
        font-size: 9px;
    }

    .con-width {
        min-width: 35px;
    }

    .scroll-con {
        overflow-y: scroll;
        height: 581px;
    }

    .scroll-con::-webkit-scrollbar {
        display: none;
    }


    .sk-folding-cube {
        margin: 20px auto;
        width: 40px;
        height: 40px;
        position: absolute;
        left: 50%;
        top: 50%;
        -webkit-transform: rotateZ(45deg);
        transform: rotateZ(45deg);
    }

    .sk-folding-cube .sk-cube {
        float: left;
        width: 50%;
        height: 50%;
        position: relative;
        -webkit-transform: scale(1.1);
        -ms-transform: scale(1.1);
        transform: scale(1.1);
    }

    .sk-folding-cube .sk-cube:before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #333;
        -webkit-animation: sk-foldCubeAngle 2.4s infinite linear both;
        animation: sk-foldCubeAngle 2.4s infinite linear both;
        -webkit-transform-origin: 100% 100%;
        -ms-transform-origin: 100% 100%;
        transform-origin: 100% 100%;
    }

    .sk-folding-cube .sk-cube2 {
        -webkit-transform: scale(1.1) rotateZ(90deg);
        transform: scale(1.1) rotateZ(90deg);
    }

    .sk-folding-cube .sk-cube3 {
        -webkit-transform: scale(1.1) rotateZ(180deg);
        transform: scale(1.1) rotateZ(180deg);
    }

    .sk-folding-cube .sk-cube4 {
        -webkit-transform: scale(1.1) rotateZ(270deg);
        transform: scale(1.1) rotateZ(270deg);
    }

    .sk-folding-cube .sk-cube2:before {
        -webkit-animation-delay: 0.3s;
        animation-delay: 0.3s;
    }

    .sk-folding-cube .sk-cube3:before {
        -webkit-animation-delay: 0.6s;
        animation-delay: 0.6s;
    }

    .sk-folding-cube .sk-cube4:before {
        -webkit-animation-delay: 0.9s;
        animation-delay: 0.9s;
    }

    @-webkit-keyframes sk-foldCubeAngle {

        0%,
        10% {
            -webkit-transform: perspective(140px) rotateX(-180deg);
            transform: perspective(140px) rotateX(-180deg);
            opacity: 0;
        }

        25%,
        75% {
            -webkit-transform: perspective(140px) rotateX(0deg);
            transform: perspective(140px) rotateX(0deg);
            opacity: 1;
        }

        90%,
        100% {
            -webkit-transform: perspective(140px) rotateY(180deg);
            transform: perspective(140px) rotateY(180deg);
            opacity: 0;
        }
    }

    @keyframes sk-foldCubeAngle {

        0%,
        10% {
            -webkit-transform: perspective(140px) rotateX(-180deg);
            transform: perspective(140px) rotateX(-180deg);
            opacity: 0;
        }

        25%,
        75% {
            -webkit-transform: perspective(140px) rotateX(0deg);
            transform: perspective(140px) rotateX(0deg);
            opacity: 1;
        }

        90%,
        100% {
            -webkit-transform: perspective(140px) rotateY(180deg);
            transform: perspective(140px) rotateY(180deg);
            opacity: 0;
        }
    }

    .blur-page {
        margin-top: -10px;
        height: 100%;
        width: 99%;
        background-color: rgba(255, 255, 255, 0.729);
        position: absolute;
    }

    .profile {
        display: none;
        width: 100%;
        background-color: #ffffffed;
        justify-content: center;
        align-items: center;
        height: 100vh;
        position: absolute;
        left: 0px;
        top: 0px;
    }

    .profile-close {
        display: flex;
        justify-content: flex-end;
        align-items: center;
    }

    .cl-ic {
        font-size: 27px;
        color: #d4d2d2;
    }

    .date-con {
        display: flex;
        justify-content: center;
        align-items: center;
        color: gray;
        font-size: 13px;
        margin-bottom: 10px;
    }
</style>

<div class="blur-page" id="b-page">
    <div class="sk-folding-cube">
        <div class="sk-cube1 sk-cube"></div>
        <div class="sk-cube2 sk-cube"></div>
        <div class="sk-cube4 sk-cube"></div>
        <div class="sk-cube3 sk-cube"></div>
    </div>
</div>

<div class="profile" id="profile">
    <div>
        <div class="profile-close" onclick="close_profile()">
            <i class="fa-regular fa-circle-xmark cl-ic"></i>
        </div>
        <div>
            {% if admin.admin_photo %}
            <img src="{{admin.admin_photo.url}}" width="300px" height="300px">
            {% endif %}
        </div>
    </div>
</div>

<div class="par-card">
    <div class="chat-card">

        <!-- HEADER -->
        <div class="head-sec">

            <div class="content">
                <div onclick="open_profile()">
                    {% if admin.admin_photo %}
                    <img src="{{admin.admin_photo.url}}" width="40" height="40" style="border-radius:50%;">
                    {% endif %}
                </div>

                <div class="font">
                    {{admin.admin_name}}
                    <input type="hidden" id="txt_id" value="{{admin.id}}">
                </div>
            </div>

            <div>
                <button style="background:none;border:none;" onclick="handleOption()">
                    <i class="fa-solid fa-ellipsis-vertical option"></i>
                </button>
            </div>

        </div>

        <!-- OPTIONS -->
        <div class="option-content" id="option-div">
            <div class="option-selection">
                <div>
                    <a style="text-decoration:none;color:white;" onclick="clearchat()">
                        <i class="fa-solid fa-broom"></i> Clear Chat
                    </a>
                </div>
            </div>
        </div>

        <!-- CHAT BODY -->
        <div class="scroll-con" id="sc-down">
            <div class="con-card" id="conversation"></div>
        </div>

        <!-- MESSAGE BOX -->
        <div class="message-card">
            <label for="photo_data">
                <i class="fas fa-paperclip ic-size"></i>
            </label>

            <input type="file" id="photo_data" style="display:none;" onchange="sendChat('{{admin.id}}')">

            <input type="text" class="message-box" id="txt_msg" placeholder="Type your message..." autocomplete="off">

            <button class="btn" onclick="sendChat('{{admin.id}}')">
                <i class="fas fa-paper-plane ic-size"></i>
            </button>
        </div>

    </div>
</div>


<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<script>

    document.getElementById("b-page").style.display = "none"
    document.getElementById("profile").style.display = "none"

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            let cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                let cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function sendChat(tid) {

        var msg = document.getElementById("txt_msg").value;
        var file = document.getElementById("photo_data").files[0];

        if (msg.trim() === "" && !file) return;

        var fd = new FormData();
        fd.append("file", file);
        fd.append("tid", tid);
        fd.append("msg", msg);

        var csrftoken = getCookie('csrftoken');

        $.ajax({
            type: 'POST',
            url: "{% url 'User:ajaxchat_usertoadmin' %}",
            data: fd,
            processData: false,
            contentType: false,
            headers: { "X-CSRFToken": csrftoken },
            success: function () {
                document.getElementById("txt_msg").value = "";
                document.getElementById("photo_data").value = "";
                viewChat();
            }
        });
    }

    function viewChat() {

        var id = document.getElementById("txt_id").value;

        $.ajax({
            url: "{% url 'User:ajaxchatview_usertoadmin' %}",
            data: { tid: id },
            success: function (data) {
                $("#conversation").html(data);
                var element = document.getElementById("sc-down");
                element.scrollTop = element.scrollHeight;
            }
        });
    }

    viewChat();
    setInterval(viewChat, 800);

    function clearchat() {

        var id = document.getElementById("txt_id").value;

        $.ajax({
            url: "{% url 'User:clearchat_usertoadmin' %}",
            data: { tid: id },
            success: function (data) {
                alert("Chat Cleared Successfully");
                viewChat();
            }
        });
    }

    function handleOption() {
        let opt = document.getElementById('option-div');
        opt.style.display = opt.style.display === "block" ? "none" : "block";
    }

    function open_profile() {
        document.getElementById("profile").style.display = "flex";
    }

    function close_profile() {
        document.getElementById("profile").style.display = "none";
    }

</script>

{% endblock %}
