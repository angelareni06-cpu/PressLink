{% extends 'User/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
        }

        form {
            margin-top: 60px;
        }

        table {
            background: #fff;
            border-collapse: collapse;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            width: 350px;
        }

        td {
            padding: 10px;
            font-size: 14px;
        }

        tr td:first-child {
            font-weight: 600;
            color: #333;
        }

        input[type="password"] {
            width: 95%;
            padding: 7px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
            font-size: 13px;
        }

        input[type="password"]:focus {
            border-color: #007bff;
        }

        input[type="submit"] {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        input[type="submit"]:hover {
            background: #0056b3;
        }
    </style>

</head>

<body>

    <form action="" method="post">
        {% csrf_token %}
        <table border="1" align="center">
            <tr>
                <td>Old Password</td>
                <td>
                    <input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
                    title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" 
                    required name="txt_old" id="txt_old">
                </td>
            </tr>

            <tr>
                <td>New Password</td>
                <td>
                    <input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
                    title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" 
                    required name="txt_new" id="txt_new">
                </td>
            </tr>

            <tr>
                <td>Confirm Password</td>
                <td>
                    <input type="password" required name="txt_confirm" id="txt_confirm">
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Change Password">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location="{% url 'User:MyProfile' %}";
</script>
{% elif msg1 %}
<script>
    alert("{{msg1}}")
</script>
{% endif %}

{% endblock %}
