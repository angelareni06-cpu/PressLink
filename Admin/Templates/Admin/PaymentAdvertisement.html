{% extends 'Admin/Header.html' %}
{% block content %}

<h3 align="center">Add Advertisement Amount</h3>

<form method="post">
    {% csrf_token %}

    <table border="1" align="center">

        <tr>
            <td>Title</td>
            <td>{{ advertise.advertisement_title }}</td>
        </tr>

        <tr>
            <td>User</td>
            <td>{{ advertise.user_id.user_name }}</td>
        </tr>

        <tr>
            <td>Amount</td>
            <td>
                <input type="number" name="txt_amount" required>
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Add Amount">
            </td>
        </tr>

    </table>

</form>

{% endblock %}
