{% extends 'Admin/Header.html' %}
{% block content %}

<style>
    body {
        font-family: Arial, sans-serif;
        background: #eef1f5;
    }

    .payment-box {
        width: 350px;
        margin: 80px auto;
        background: #ffffff;
        padding: 25px;
        border-radius: 10px;
        border-top: 5px solid #4CAF50;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h3 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    td {
        padding: 10px;
        text-align: center;
    }

    input[type="number"] {
        width: 90%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    input[type="number"]:focus {
        outline: none;
        border-color: #4CAF50;
    }

    input[type="submit"] {
        background: #4CAF50;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
    }

    input[type="submit"]:hover {
        background: #45a049;
    }

</style>

<div class="payment-box">

    <h3>Add Payment Amount</h3>

    <form action="" method="post">
        {% csrf_token %}

        <table>

            <tr>
                <td>Amount</td>
                <td>
                    <input type="number" name="txt_amount" id="txt_amount" min="1" step="0.01" required>
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    <input type="submit" value="Submit">
                </td>
            </tr>

        </table>

    </form>

</div>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Admin:FPublishedNews' %}";
</script>
{% endif %}

{% if msg1 %}
<script>
    alert("{{msg1}}");
    window.location = "{% url 'Admin:Advertisement' %}";
</script>
{% endif %}

{% endblock %}
