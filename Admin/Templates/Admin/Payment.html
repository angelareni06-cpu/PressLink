{% extends 'Admin/Header.html' %}
{% block content %}

<h3 align="center">Add Payment Amount</h3>

<form action="" method="post">
    {% csrf_token %}

    <table border="1" align="center">

        <tr>
            <td>Amount</td>
            <td>
                <input type="number" name="txt_amount" id="txt_amount" min="1" step="0.01" required>
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Submit">
            </td>
        </tr>

    </table>

</form>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Admin:FPublishedNews' %}";
</script>
{% endif %}

{% if msg1 %}
<script>
    alert("{{msg1}}");
    window.location = "{% url 'Admin:Advertisement' %}";
</script>
{% endif %}

{% endblock %}
