{% extends 'Admin/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
        }

        .container {
            width: 70%;
            margin: 20px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: #ffffff;
        }

        td, th {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #e0e0e0;
        }

        input[type="text"], select {
            width: 90%;
            padding: 7px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input[type="submit"] {
            padding: 7px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        input[type="submit"]:hover {
            background: #45a049;
        }

        a {
            text-decoration: none;
            margin: 0 5px;
            color: #0066cc;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

    <h1>Place</h1>

    <div class="container">

        <form action="" method="post">
            {%csrf_token %}
            <table>
                <tr>
                    <td>District</td>
                    <td>
                        <select name="sel_district" id="sel_district">
                            <option value="">--select--</option>
                            {% for i in district %}
                            <option {% if i.id == editdata.district.id %} selected {% endif %} value="{{i.id}}">
                                {{i.district_name}}
                            </option>
                            {% endfor %}
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Place</td>
                    <td>
                        <input type="text" name="txt_place" id="txt_place" value="{{ editdata.place_name }}">
                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        <input type="submit" value="Submit">
                    </td>
                </tr>
            </table>
        </form>

        <table>
            <tr>
                <th>Sl.No</th>
                <th>District</th>
                <th>Place</th>
                <th>Action</th>
            </tr>

            {% for i in place %}
            <tr>
                <td>{{forloop.counter}}</td>
                <td>{{i.district.district_name}}</td>
                <td>{{i.place_name}}</td>
                <td>
                    <a href="{% url 'Admin:delplace' i.id %}">Delete</a> /
                    <a href="{% url 'Admin:editplace' i.id %}">Edit</a>
                </td>
            </tr>
            {% endfor %}
        </table>

    </div>

</body>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Admin:place' %}";
</script>
{% endif %}

</html>
{% endblock %}
