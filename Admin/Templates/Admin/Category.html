{% extends 'Admin/Header.html' %}
{% block content %}

<h3 align="center">Category Management</h3>

<form action="" method="post">
    {% csrf_token %}

    <table border="1" align="center">

        <tr>
            <td>Category</td>
            <td>
                <input type="text" name="txt_category" id="txt_category" required
                    value="{{ editdata.category_name|default:'' }}">
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="{% if editdata %}Update{% else %}Submit{% endif %}">
            </td>
        </tr>

    </table>

</form>

<br><br>

<table border="1" align="center">

    <tr>
        <th>Sl.No</th>
        <th>Category</th>
        <th>Action</th>
    </tr>

    {% for i in category %}
    <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ i.category_name }}</td>
        <td>
            <a href="{% url 'Admin:delcategory' i.id %}">Delete</a>
            |
            <a href="{% url 'Admin:editcategory' i.id %}">Edit</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3" align="center">No Categories Found</td>
    </tr>
    {% endfor %}

</table>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Admin:category' %}";
</script>
{% endif %}

{% endblock %}
