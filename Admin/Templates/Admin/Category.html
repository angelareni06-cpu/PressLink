{% extends 'Admin/Header.html' %}
{% block content %}

<style>
    body {
        background: #f4f6f9;
        font-family: 'Segoe UI', sans-serif;
    }

    .wrapper {
        width: 90%;
        margin: 40px auto;
        display: flex;
        gap: 30px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        padding: 25px;
        flex: 1;
        min-width: 320px;
        max-width: 450px;
    }

    h3 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    td, th {
        padding: 10px;
        text-align: center;
    }

    th {
        background: #4f46e5;
        color: #fff;
    }

    tr:nth-child(even) {
        background: #f9fafb;
    }

    input[type="text"] {
        width: 95%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        transition: 0.3s;
    }

    input[type="text"]:focus {
        border-color: #4f46e5;
        outline: none;
        box-shadow: 0 0 5px rgba(79,70,229,0.4);
    }

    .btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #4f46e5;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #4338ca;
    }

    .action a {
        text-decoration: none;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 13px;
        margin: 2px;
        display: inline-block;
    }

    .action a:first-child {
        background: #ef4444;
        color: white;
    }

    .action a:last-child {
        background: #10b981;
        color: white;
    }

    .action a:hover {
        opacity: 0.8;
    }

    .empty {
        font-weight: bold;
        padding: 15px;
    }

</style>

<h3>Category Management</h3>

<div class="wrapper">

    <!-- FORM CARD -->
    <div class="card">
        <form action="" method="post">
            {% csrf_token %}
            <table>
                <tr>
                    <td>Category</td>
                    <td>
                        <input type="text" name="txt_category" id="txt_category" required
                            value="{{ editdata.category_name|default:'' }}">
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <input type="submit" class="btn"
                            value="{% if editdata %}Update{% else %}Submit{% endif %}">
                    </td>
                </tr>
            </table>
        </form>
    </div>

    <!-- TABLE CARD -->
    <div class="card">
        <table>
            <tr>
                <th>Sl.No</th>
                <th>Category</th>
                <th>Action</th>
            </tr>

            {% for i in category %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ i.category_name }}</td>
                <td class="action">
                    <a href="{% url 'Admin:delcategory' i.id %}">Delete</a>
                    <a href="{% url 'Admin:editcategory' i.id %}">Edit</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="empty">No Categories Found</td>
            </tr>
            {% endfor %}

        </table>
    </div>

</div>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Admin:category' %}";
</script>
{% endif %}

{% endblock %}
