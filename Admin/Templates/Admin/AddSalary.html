{% extends 'Admin/Header.html' %}
{% block content %}
<h3 align="center">Add Salary for
    {% if type == 'reporter' %}{{ data.reporter_name }}
    {% elif type == 'editor' %}{{ data.editor_name }}
    {% elif type == 'verifier' %}{{ data.verifier_name }}
    {% endif %}
</h3>
<form method="post">
    {% csrf_token %}
    <table border="1" align="center" cellpadding="10" style="background:#fff;">
        <tr>
            <td>Amount</td>
            <td><input type="number" name="txt_amount" required></td>
        </tr>
        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Add Salary">
            </td>
        </tr>
    </table>
</form>
{% endblock %}
