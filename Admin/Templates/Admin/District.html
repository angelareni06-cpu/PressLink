{% extends 'Admin/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>District</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }

        h2 {
            text-align: center;
        }

        table {
            border-collapse: collapse;
            margin: 20px auto;
            background: #fff;
            width: 60%;
        }

        td, th {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #e6e6e6;
        }

        input[type="text"] {
            width: 90%;
            padding: 6px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            padding: 6px 12px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background: #45a049;
        }

        a {
            text-decoration: none;
            margin: 0 5px;
            color: #0066cc;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h2>District Management</h2>

    <form action="" method="post">
        {%csrf_token %}
        <table>
            <tr>
                <td>District</td>
                <td>
                    <input type="text" name="txt_district" id="txt_district"
                        value="{{editdata.district_name}}">
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="submit" value="Submit">
                </td>
            </tr>
        </table>
    </form>

    <table>
        <tr>
            <th>Sl.No</th>
            <th>District</th>
            <th>Actions</th>
        </tr>

        {% for i in district %}
        <tr>
            <td>{{forloop.counter}}</td>
            <td>{{i.district_name}}</td>
            <td>
                <a href="{% url 'Admin:deldistrict' i.id %}">Delete</a> |
                <a href="{% url 'Admin:editdistrict' i.id %}">Edit</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>

</html>

{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Admin:District' %}";
</script>
{% endif %}

{% endblock %}
