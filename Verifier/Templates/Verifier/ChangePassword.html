{% extends 'Verifier/Header.html' %}
{% block content %}

<h3 align="center">Change Password</h3>

<form method="post">
    {% csrf_token %}

    <table border="1" align="center">

        <tr>
            <td>Old Password</td>
            <td>
                <input type="password" name="txt_old" id="txt_old" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                    title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 characters"
                    required>
            </td>
        </tr>

        <tr>
            <td>New Password</td>
            <td>
                <input type="password" name="txt_new" id="txt_new" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                    title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 characters"
                    required>
            </td>
        </tr>

        <tr>
            <td>Confirm Password</td>
            <td>
                <input type="password" name="txt_confirm" id="txt_confirm" required>
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Change Password">
            </td>
        </tr>

    </table>
</form>

{% if msg %}
<script>
    alert("{{ msg }}");
    window.location = "{% url 'Verifier:MyProfile' %}";
</script>

{% elif msg1 %}
<script>
    alert("{{ msg1 }}");
</script>
{% endif %}

{% endblock %}
