{% extends 'Verifier/Header.html' %}
{% block content %}

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
    }

    h3 {
        margin-top: 40px;
        color: #333;
    }

    table {
        margin-top: 25px;
        width: 350px;
        background: #fff;
        border-collapse: collapse;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        border-radius: 8px;
    }

    td {
        padding: 12px;
        font-size: 14px;
    }

    tr td:first-child {
        font-weight: 600;
        color: #444;
        width: 130px;
    }

    input[type="password"] {
        width: 90%;
        padding: 7px;
        font-size: 13px;
        border: 1px solid #ccc;
        border-radius: 5px;
        outline: none;
    }

    input[type="password"]:focus {
        border-color: #007bff;
    }

    input[type="submit"] {
        padding: 7px 18px;
        font-size: 13px;
        border: none;
        border-radius: 5px;
        background: #007bff;
        color: white;
        cursor: pointer;
    }

    input[type="submit"]:hover {
        background: #0056b3;
    }

    tr:nth-child(even) {
        background: #f9f9f9;
    }
</style>

<h3 align="center">Change Password</h3>

<form method="post">
    {% csrf_token %}

    <table border="1" align="center">

        <tr>
            <td>Old Password</td>
            <td>
                <input type="password" name="txt_old" id="txt_old" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                    title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 characters"
                    required>
            </td>
        </tr>

        <tr>
            <td>New Password</td>
            <td>
                <input type="password" name="txt_new" id="txt_new" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                    title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 characters"
                    required>
            </td>
        </tr>

        <tr>
            <td>Confirm Password</td>
            <td>
                <input type="password" name="txt_confirm" id="txt_confirm" required>
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Change Password">
            </td>
        </tr>

    </table>
</form>

{% if msg %}
<script>
    alert("{{ msg }}");
    window.location = "{% url 'Verifier:MyProfile' %}";
</script>

{% elif msg1 %}
<script>
    alert("{{ msg1 }}");
</script>
{% endif %}

{% endblock %}
