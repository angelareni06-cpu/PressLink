{% extends 'Verifier/Header.html' %}
{% block content %}

<style>
    /* Page Wrapper */
    body {
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
        margin: 0;
        padding: 20px 0;
    }

    h3 {
        text-align: center;
        color: #333;
        font-weight: normal;
        margin-bottom: 20px;
    }

    /* Form Table */
    table {
        width: 50%;
        margin: auto;
        border-collapse: collapse;
        background-color: #fff;
        border: 1px solid #ddd;
        border-radius: 5px;
        overflow: hidden;
    }

    td {
        padding: 12px;
        border-bottom: 1px solid #eee;
    }

    td:first-child {
        font-weight: bold;
        color: #555;
        width: 40%;
    }

    td:last-child input {
        width: 95%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        outline: none;
    }

    /* Submit Button */
    input[type="submit"] {
        background-color: #007bff;
        color: white;
        padding: 8px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        margin-top: 10px;
    }

    input[type="submit"]:hover {
        background-color: #0056b3;
    }

    /* Responsive */
    @media screen and (max-width: 768px) {
        table {
            width: 90%;
        }
        td:first-child {
            width: 35%;
        }
    }
</style>

<h3>Edit Profile</h3>

<form method="post">
    {% csrf_token %}

    <table border="1" align="center">

        <tr>
            <td>Name</td>
            <td>
                <input type="text" name="txt_name" id="txt_name" pattern="^[A-Z][a-zA-Z ]*$"
                    title="Allows Only Alphabets, Spaces and First Letter Must Be Capital"
                    value="{{ verifierData.verifier_name }}" required>
            </td>
        </tr>

        <tr>
            <td>Email</td>
            <td>
                <input type="email" name="txt_email" id="txt_email" value="{{ verifierData.verifier_email }}" required>
            </td>
        </tr>

        <tr>
            <td>Contact</td>
            <td>
                <input type="text" name="txt_contact" id="txt_contact" pattern="[7-9]{1}[0-9]{9}"
                    title="Phone number must start with 7-9 and contain 10 digits"
                    value="{{ verifierData.verifier_contact }}" required>
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Update">
            </td>
        </tr>

    </table>
</form>

{% if msg %}
<script>
    alert("{{ msg }}");
    window.location = "{% url 'Verifier:MyProfile' %}";
</script>
{% endif %}

{% endblock %}
