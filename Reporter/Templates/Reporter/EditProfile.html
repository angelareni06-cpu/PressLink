{% extends 'Reporter/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditProfile</title>

    <style>
        /* Page Background - Light Peach */

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #fff1eb, #ffe4d6);
        }


        /* Form spacing */

        form {
            margin-top: 40px;
        }


        /* Table Design */

        table {

            border-collapse: collapse;
            width: 480px;
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);

        }


        /* Table Cells */

        td {

            padding: 14px;
            border-bottom: 1px solid #f1f1f1;

        }


        /* Label Column */

        td:first-child {

            background: #fff7f3;
            font-weight: 600;
            color: #444;
            width: 40%;

        }


        /* Inputs */

        input[type="text"],
        textarea {

            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ffd6c9;
            font-size: 14px;
            outline: none;
            transition: 0.3s;

        }


        /* Input Focus Effect */

        input[type="text"]:focus,
        textarea:focus {

            border-color: #ff9a76;
            box-shadow: 0 0 6px rgba(255, 154, 118, 0.3);

        }


        /* Button */

        input[type="submit"] {

            background: linear-gradient(to right, #ff9a76, #ff6a88);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;

        }


        /* Button Hover */

        input[type="submit"]:hover {

            background: linear-gradient(to right, #ff6a88, #ff9a76);
            transform: scale(1.05);

        }


        /* Remove last border */

        tr:last-child td {

            border-bottom: none;

        }
    </style>

</head>

<body>
    <form action="" method="post">
        {%csrf_token %}
        <table border="1" align="center">
            <tr>
                <td>Name</td>
                <td><input type="text" required name="txt_name"
                        id="txt_name Allows Only Alphabets,Spaces and First Letter Must Be Capital Letter"
                        pattern="^[A-Z]+[a-zA-Z ]*$" value="{{reporterdata.reporter_name}}"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="text" required name="txt_email" id="txt_email" value="{{reporterdata.reporter_email}}">
                </td>
            </tr>
            <tr>
                <td>Contact</td>
                <td><input type="text" required name="txt_contact" id="txt_contact" pattern="[7-9]{1}[0-9]{9}"
                        title="Phone number with 7-9 and remaing 9 digit with 0-9"
                        value="{{reporterdata.reporter_contact}}"></td>
            </tr>
            <tr>
                <td>Address</td>
                <td><textarea name="txt_address" id="txt_address" required>{{reporterdata.reporter_address}}</textarea>
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Update"></td>
            </tr>
        </table>
    </form>
</body>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Reporter:MyProfile' %}";
</script>
{% endif %}

</html>

{% endblock %}
