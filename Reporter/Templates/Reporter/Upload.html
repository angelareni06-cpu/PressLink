{% extends 'Reporter/Header.html' %}
{% block content %}

<style>
    /* Page Wrapper */
    .page-wrapper {
        padding: 40px 0;
        background: #e8f8f5;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
    }

    /* Upload Card */
    .upload-card {
        width: 500px;
        margin: auto;
        background: white;
        border-radius: 10px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        padding: 20px;
        margin-bottom: 30px;
    }

    /* Table */
    table {
        width: 100%;
        border-collapse: collapse;
    }

    td {
        padding: 12px;
        border-bottom: 1px solid #d5f5e3;
        text-align: center;
    }

    /* Header row */
    thead {
        background: #48c9b0;
        color: white;
        font-weight: bold;
    }

    /* File Input */
    input[type="file"] {
        padding: 6px;
    }

    /* Submit Button */
    input[type="submit"] {
        background: #48c9b0;
        color: white;
        border: none;
        padding: 10px 25px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    input[type="submit"]:hover {
        background: #17a589;
    }

    /* Image */
    img {
        border-radius: 6px;
        border: 2px solid #d5f5e3;
        transition: 0.3s;
    }

    img:hover {
        transform: scale(1.08);
    }

    /* Delete Button */
    .delete-btn {
        text-decoration: none;
        background: #e74c3c;
        color: white;
        padding: 6px 14px;
        border-radius: 5px;
        font-size: 13px;
        transition: 0.3s;
    }

    .delete-btn:hover {
        background: #c0392b;
    }

    /* Responsive */
    @media(max-width:600px) {
        .upload-card {
            width: 95%;
        }
    }
</style>

<div class="page-wrapper">

    <!-- Upload Form -->
    <div class="upload-card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <table>
                <tr>
                    <td>Upload Extra Files</td>
                    <td><input type="file" name="file_upload" required></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <input type="submit" value="Submit">
                    </td>
                </tr>
            </table>
        </form>
    </div>

    <!-- Uploaded Files List -->
    <div class="upload-card">
        <table>
            <thead>
                <tr>
                    <td>Sl.No</td>
                    <td>Extra Files</td>
                    <td>Action</td>
                </tr>
            </thead>

            {% for i in uploaddata %}
            <tr>
                <td>{{forloop.counter}}</td>
                <td>
                    <img src="{{i.upload_files.url}}" width="100" height="100">
                </td>
                <td>
                    <a href="{% url 'Reporter:delfile' i.id nid %}" class="delete-btn">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Reporter:UploadFiles' nid %}";
</script>
{% endif %}

{% endblock %}
