{% extends 'Reporter/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>

    <style>
        /* Page Background - Same as Edit Profile */

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #fff1eb, #ffe4d6);
        }


        /* Table Design */

        table {

            border-collapse: collapse;

            margin-top: 100px;

            background: #ffffff;

            width: 420px;

            border-radius: 14px;

            overflow: hidden;

            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);

        }


        /* Table Cells */

        td {

            padding: 14px;

            font-size: 15px;

            border-bottom: 1px solid #f1f1f1;

        }


        /* Left Labels */

        td:first-child {

            background: #fff7f3;

            font-weight: 600;

            color: #444;

            width: 45%;

        }


        /* Input Fields */

        input[type="password"] {

            width: 95%;

            padding: 10px;

            border-radius: 8px;

            border: 1px solid #ffd6c9;

            outline: none;

            transition: 0.3s;

        }


        /* Input Focus */

        input[type="password"]:focus {

            border-color: #ff9a76;

            box-shadow: 0 0 6px rgba(255, 154, 118, 0.3);

        }


        /* Button */

        input[type="submit"] {

            background: linear-gradient(to right, #ff9a76, #ff6a88);

            color: white;

            padding: 10px 25px;

            border: none;

            border-radius: 8px;

            font-size: 15px;

            font-weight: 600;

            cursor: pointer;

            transition: 0.3s;

        }


        /* Button Hover */

        input[type="submit"]:hover {

            background: linear-gradient(to right, #ff6a88, #ff9a76);

            transform: scale(1.05);

        }


        /* Last Row */

        tr:last-child td {

            border-bottom: none;

        }
    </style>

</head>


<body>

    <form action="" method="post">

        {%csrf_token %}

        <table border="1" align="center">


            <tr>
                <td>Old Password</td>

                <td>
                    <input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                        title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                        required name="txt_old" id="txt_old">
                </td>

            </tr>



            <tr>

                <td>New Password</td>

                <td>
                    <input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                        title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                        required name="txt_new" id="txt_new">
                </td>

            </tr>



            <tr>

                <td>Confirm Password</td>

                <td>
                    <input type="password" required name="txt_confirm" id="txt_confirm">

                </td>

            </tr>



            <tr>

                <td colspan="2" align="center">

                    <input type="submit" value="Change Password">

                </td>

            </tr>



        </table>

    </form>

</body>

</html>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Reporter:MyProfile' %}";
</script>
{% elif msg1 %}
<script>
    alert("{{msg1}}")
</script>
{% endif %}

{% endblock %}
