{% extends 'Reporter/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditNewsUpload</title>

    <style>
        /* Page Background */

        body {

            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #fff1eb, #ffe5d9);

        }


        /* Form spacing */

        form {

            margin-top: 40px;

        }


        /* Table Design */

        table {

            border-collapse: collapse;

            width: 520px;

            background: #ffffff;

            border-radius: 14px;

            overflow: hidden;

            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);

        }


        /* Header effect (first row) */

        tr:first-child {

            background: linear-gradient(to right, #ffd6cc, #ffe0cc);

            color: #7c2d12;

            font-weight: 600;

        }


        /* Table Cells */

        td {

            padding: 14px;

            border-bottom: 1px solid #f1f1f1;

        }


        /* Label cells */

        td:first-child {

            background: #fff7f5;

            font-weight: 600;

            color: #9a3412;

            width: 40%;

        }


        /* Inputs */

        input[type="text"],
        input[type="file"],
        select,
        textarea {

            width: 95%;

            padding: 9px;

            border-radius: 7px;

            border: 1px solid #f8caca;

            outline: none;

            font-size: 14px;

            transition: 0.3s;

        }


        /* Focus Effect */

        input:focus,
        textarea:focus,
        select:focus {

            border-color: #fb7185;

            box-shadow: 0 0 6px rgba(251, 113, 133, 0.25);

        }


        /* Button */

        input[type="submit"] {

            background: linear-gradient(to right, #fb7185, #fda4af);

            color: white;

            padding: 10px 26px;

            border: none;

            border-radius: 7px;

            font-size: 15px;

            cursor: pointer;

            transition: 0.3s;

        }


        /* Button Hover */

        input[type="submit"]:hover {

            background: linear-gradient(to right, #f43f5e, #fb7185);

            transform: scale(1.05);

        }


        /* Image */

        img {

            margin-top: 10px;

            border-radius: 10px;

            border: 3px solid #ffe4e6;

            transition: 0.3s;

        }


        /* Image hover */

        img:hover {

            transform: scale(1.05);

            border-color: #fda4af;

        }


        /* Last row border remove */

        tr:last-child td {

            border-bottom: none;

        }
    </style>

</head>

<body onload="">

    <form action="" method="post" enctype="multipart/form-data">
        {%csrf_token %}
        <table border="1" align="center">
            <tr>
                <td>Title</td>
                <td><input type="text" required name="txt_title" id="txt_title" value="{{NewsData.news_title}}"></td>
            </tr>
            <tr>
                <td>Content</td>
                <td><textarea name="txt_content" id="txt_content" value="" required>{{NewsData.news_content}}</textarea>
                </td>
            </tr>
            <tr>
                <td>Image</td>
                <td><input type="file" required name="file_image" id="file_image" value="">
                    {% if NewsData.news_image %}
                    <img src="{{NewsData.news_image.url}}" width="150" alt="">
                    {% endif %}
                </td>
            </tr>
            <tr>
                <td>Category</td>
                <td><select name="sel_category" id="sel_category" required>
                        <option value="">---select---</option>
                        {% for i in category %}
                        <option {% if i.id == NewsData.subcategory.category.id %} selected {% endif %} value="{{i.id}}">
                            {{i.category_name}}
                        </option>
                        {% endfor %}
                    </select></td>
            </tr>
            <tr>
                <td>Subcategory</td>
                <td><select name="sel_subcategory" id="sel_subcategory" required
                        data-selected="{{ NewsData.subcategory.id }}">
                        <option value="">---select---</option>
                    </select></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Submit"></td>
                <td></td>
            </tr>
        </table>
    </form>

</body>

</html>
{% if msg %}
<script>
    alert("{{msg}}")
    window.location = "{% url 'Reporter:AddNews' %}";
</script>
{% endif %}

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<script>
    function loadSubcategory(cid, selectedSubcat = null) {
        var ur = "{% url 'User:AjaxSubcategory' %}";

        $.ajax({
            url: ur,
            data: { cid: cid },
            success: function (data) {
                $("#sel_subcategory").html(data);

                if (selectedSubcat) {
                    $("#sel_subcategory").val(selectedSubcat);
                }
            }
        });
    }

    $("#sel_category").change(function () {
        var cid = $(this).val();
        loadSubcategory(cid);
    });

    $(document).ready(function () {
        var cid = $("#sel_category").val();
        var selectedSubcat = $("#sel_subcategory").data("selected");

        if (cid) {
            loadSubcategory(cid, selectedSubcat);
        }
    });
</script>

{% endblock %}
