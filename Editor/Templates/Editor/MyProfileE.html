{% extends 'Editor/Header.html' %}
{% block content %}

<style>
    /* Page wrapper */
    .page-wrapper {
        min-height: 100vh;
        padding-top: 40px;
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
    }

    /* Profile card */
    .profile-card {
        max-width: 500px;
        margin: 40px auto;
        padding: 20px;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        text-align: center;
    }

    /* Profile image */
    img {
        border-radius: 50%;
        width: 200px;
        height: 200px;
        object-fit: cover;
        margin-bottom: 20px;
        border: 2px solid #ddd;
    }

    /* Table */
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }

    td {
        padding: 10px;
        font-size: 16px;
        text-align: left;
    }

    td:first-child {
        color: #333;
        font-weight: 600;
        width: 35%;
    }

    /* Links */
    a {
        text-decoration: none;
        color: #007bff;
        font-weight: 500;
        margin: 0 8px;
        transition: color 0.3s;
    }

    a:hover {
        color: #0056b3;
        text-decoration: underline;
    }
</style>

<div class="page-wrapper">

    <div class="profile-card">

        <table align="center">

            <tr>
                <td colspan="2" align="center">

                    {% if editordata.editor_photo %}
                    <img src="{{editordata.editor_photo.url}}" alt="editor">
                    {% else %}
                    <img src="/static/default.png" alt="default">
                    {% endif %}

                </td>
            </tr>

            <tr>
                <td>Name</td>
                <td>{{editordata.editor_name}}</td>
            </tr>

            <tr>
                <td>Email</td>
                <td>{{editordata.editor_email}}</td>
            </tr>

            <tr>
                <td>Contact</td>
                <td>{{editordata.editor_contact}}</td>
            </tr>

            <tr>
                <td colspan="2" align="center">

                    <a href="{% url 'Editor:EditProfile' %}">Edit Profile</a> |
                    <a href="{% url 'Editor:ChangePassword' %}">Change Password</a>

                </td>
            </tr>

        </table>

    </div>

</div>

{% endblock %}
