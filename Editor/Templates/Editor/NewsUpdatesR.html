{% extends 'Editor/Header.html' %}
{% block content %}

<style>
    .page-wrapper {
        min-height: 100vh;
        padding-top: 50px;
        font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #cfe9ff, #d1f5ea);
    }

    /* card */
    .card {
        background: white;
        border-radius: 12px;
        padding: 25px;
        box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.1);
        max-width: 700px;
        width: 95%;
        margin: auto;
        margin-bottom: 30px;
    }

    /* heading */
    h3 {
        color: #5aa7d6;
        margin-bottom: 15px;
        font-size: 22px;
        text-align: center;
    }

    /* table */
    table {
        width: 100%;
        border-collapse: collapse;
    }

    /* cells */
    td {
        padding: 12px 15px;
        border-bottom: 1px solid #e0f2ff;
        font-size: 15px;
    }

    /* header row */
    tr:first-child {
        background: #bde3ff;
        color: #2a6f97;
        font-weight: bold;
    }

    /* zebra */
    tr:nth-child(even) {
        background: #f4fbff;
    }

    /* hover */
    tr:hover {
        background: #e6faf3;
    }

    /* input */
    input[type="text"] {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 2px solid #bde3ff;
        font-size: 15px;
        outline: none;
        background: #f8fdff;
        transition: 0.3s;
    }

    /* focus */
    input[type="text"]:focus {
        border: 2px solid #8ee0c1;
        background: white;
        box-shadow: 0px 0px 8px rgba(142, 224, 193, 0.4);
    }

    /* button */
    input[type="submit"] {
        background: #8ee0c1;
        color: white;
        border: none;
        padding: 10px 25px;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    /* hover */
    input[type="submit"]:hover {
        background: #5aa7d6;
    }

    /* delete link */
    a {
        text-decoration: none;
        color: #5aa7d6;
        font-weight: 600;
        transition: 0.3s;
    }

    /* hover */
    a:hover {
        color: #ff4d4d;
        text-decoration: underline;
    }
</style>


<div class="page-wrapper">

    <!-- Add Remark -->
    <div class="card">

        <form method="post">
            {% csrf_token %}

            <table>

                <tr>
                    <td>Remarks</td>
                    <td>
                        <input type="text" required name="txt_remarks">
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Submit">
                    </td>
                </tr>

            </table>

        </form>

    </div>


    <!-- Remarks List -->
    <div class="card">

        <h3>Remarks List</h3>

        <table>

            <tr>
                <td>Sl.No</td>
                <td>Remarks</td>
                <td>Action</td>
            </tr>

            {% for i in NewsUpdatesR %}
            <tr>
                <td>{{forloop.counter}}</td>
                <td>{{i.newsupdatesr_remarks}}</td>
                <td>
                    <a href="{% url 'Editor:delremarks' i.id nid %}"
                        onclick="return confirm('Are you sure you want to delete this remark?')">
                        Delete
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" align="center">No remarks added yet.</td>
            </tr>
            {% endfor %}

        </table>

    </div>

</div>


{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Editor:NewsUpdatesR' nid %}";
</script>
{% endif %}

{% endblock %}
