{% extends 'Editor/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>

    <style>
        body {
            margin: 0;
            padding: 0;

            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;

            /* light blue + light green gradient */
            background: linear-gradient(135deg, #cfe9ff, #d1f5ea);
        }

        /* form spacing */
        form {
            margin-top: 70px;
        }

        /* card */
        table {
            background: #ffffff;

            border: none;

            border-radius: 12px;

            padding: 30px;

            box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.1);

            border-top: 6px solid #bde3ff;

            border-bottom: 6px solid #8ee0c1;
        }

        /* text */
        td {
            padding: 15px;

            border: none;

            font-size: 16px;
        }

        /* label */
        td:first-child {
            color: #5aa7d6;

            font-weight: 600;
        }

        /* input box */
        input[type="text"] {
            width: 260px;

            padding: 10px;

            border-radius: 6px;

            border: 2px solid #bde3ff;

            font-size: 15px;

            outline: none;

            background: #f8fdff;
        }

        /* input focus */
        input[type="text"]:focus {
            border: 2px solid #8ee0c1;

            background: white;

            box-shadow: 0px 0px 8px rgba(142, 224, 193, 0.4);
        }

        /* button */
        input[type="submit"] {
            background: #8ee0c1;

            color: white;

            border: none;

            padding: 10px 30px;

            border-radius: 6px;

            font-size: 16px;

            cursor: pointer;
        }

        /* button hover */
        input[type="submit"]:hover {
            background: #5aa7d6;
        }
    </style>

</head>

<body>

    <form action="" method="post">

        {%csrf_token %}

        <table border="1" align="center">

            <tr>

                <td>Name</td>

                <td>

                    <input type="text" required name="txt_name"
                        id="txt_name Allows Only Alphabets,Spaces and First Letter Must Be Capital Letter"
                        pattern="^[A-Z]+[a-zA-Z ]*$" value="{{editordata.editor_name}}">

                </td>

            </tr>

            <tr>

                <td>Email</td>

                <td>

                    <input type="text" required name="txt_email" id="txt_email" value="{{editordata.editor_email}}">

                </td>

            </tr>

            <tr>

                <td>Contact</td>

                <td>

                    <input type="text" required name="txt_contact" id="txt_contact" pattern="[7-9]{1}[0-9]{9}"
                        title="Phone number with 7-9 and remaing 9 digit with 0-9"
                        value="{{editordata.editor_contact}}">

                </td>

            </tr>

            <tr>

                <td colspan="2" align="center">

                    <input type="submit" value="Update">

                </td>

            </tr>

        </table>

    </form>

</body>

{% if msg %}

<script>

    alert("{{msg}}")

    window.location = "{% url 'Editor:MyProfile' %}";

</script>

{% endif %}

</html>

{% endblock %}
