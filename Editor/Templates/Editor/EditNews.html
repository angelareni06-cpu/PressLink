{% extends 'Editor/Header.html' %}
{% block content %}

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
    }

    .container {
        width: 60%;
        margin: auto;
        margin-top: 30px;
    }

    h3 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .card {
        background: #fff;
        padding: 20px 25px;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .row {
        display: flex;
        margin-bottom: 15px;
        align-items: center;
    }

    .label {
        width: 30%;
        font-weight: 600;
        color: #444;
    }

    .field {
        width: 70%;
    }

    input[type="text"],
    textarea,
    select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
    }

    textarea {
        resize: none;
    }

    .readonly {
        background: #eee;
        padding: 8px;
        border-radius: 4px;
    }

    .image-box img {
        width: 120px;
        border-radius: 4px;
        margin-bottom: 8px;
    }

    input[type="file"] {
        margin-top: 5px;
    }

    .btn {
        text-align: center;
        margin-top: 20px;
    }

    .btn input {
        background: #007bff;
        color: white;
        padding: 10px 25px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .btn input:hover {
        background: #0056b3;
    }
</style>

<div class="container">

    <h3>Edit News</h3>

    <div class="card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="row">
                <div class="label">Title</div>
                <div class="field">
                    <input type="text" name="txt_title" value="{{ newsdata.news_title }}" required>
                </div>
            </div>

            <div class="row">
                <div class="label">Content</div>
                <div class="field">
                    <textarea name="txt_content" rows="5" required>{{ newsdata.news_content }}</textarea>
                </div>
            </div>

            <div class="row">
                <div class="label">Category</div>
                <div class="field">
                    <div class="readonly">
                        {{ newsdata.subcategory.category.category_name }}
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="label">Subcategory</div>
                <div class="field">
                    <select name="sel_subcategory" required>
                        {% for sub in subcategories %}
                        <option value="{{ sub.id }}"
                            {% if newsdata.subcategory.id == sub.id %}selected{% endif %}>
                            {{ sub.subcategory_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="label">Current Image</div>
                <div class="field image-box">
                    {% if newsdata.news_image %}
                    <img src="{{ newsdata.news_image.url }}">
                    {% else %}
                    No Image
                    {% endif %}
                </div>
            </div>

            <div class="row">
                <div class="label">Change Image</div>
                <div class="field">
                    <input type="file" name="file_image">
                </div>
            </div>

            <div class="btn">
                <input type="submit" value="Save & Submit">
            </div>

        </form>
    </div>

</div>

{% if msg %}
<script>
    alert("{{ msg }}");
</script>
{% endif %}

{% endblock %}
