{% extends 'Editor/Header.html' %}
{% block content %}

<style>
    .page-wrapper {
        min-height: 100vh;
        background: #f7f7f7;
        padding-top: 60px;
        font-family: Arial, sans-serif;
    }

    .password-card {
        background: #ffffff;
        width: 430px;
        margin: auto;
        padding: 28px;
        border-radius: 8px;
        border: 1px solid #e3e3e3;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    td {
        padding: 12px 8px;
        font-size: 15px;
        color: #333;
    }

    td:first-child {
        width: 38%;
        font-weight: 600;
    }

    input[type="password"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d6d6d6;
        border-radius: 6px;
        font-size: 14px;
        background: #fff;
        outline: none;
        box-sizing: border-box;
    }

    input[type="password"]:focus {
        border-color: #999;
    }

    input[type="submit"] {
        background: #222;
        color: #fff;
        border: none;
        padding: 10px 22px;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
    }

    input[type="submit"]:hover {
        background: #000;
    }

    @media (max-width: 576px) {
        .password-card {
            width: 90%;
            padding: 20px;
        }

        td {
            display: block;
            width: 100%;
            padding: 8px 0;
        }

        td:first-child {
            margin-top: 10px;
        }
    }
</style>

<div class="page-wrapper">

    <form method="post">
        {% csrf_token %}

        <div class="password-card">

            <table align="center">

                <tr>
                    <td>Old Password</td>
                    <td>
                        <input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                            title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                            required name="txt_old">
                    </td>
                </tr>

                <tr>
                    <td>New Password</td>
                    <td>
                        <input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                            title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                            required name="txt_new">
                    </td>
                </tr>

                <tr>
                    <td>Confirm Password</td>
                    <td>
                        <input type="password" required name="txt_confirm">
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Change Password">
                    </td>
                </tr>

            </table>

        </div>

    </form>

</div>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Editor:MyProfile' %}";
</script>
{% elif msg1 %}
<script>
    alert("{{msg1}}");
</script>
{% endif %}

{% endblock %}
