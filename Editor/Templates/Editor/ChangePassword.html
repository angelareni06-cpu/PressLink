{% extends 'Editor/Header.html' %}
{% block content %}

<style>
    .page-wrapper {
        min-height: 100vh;
        background: linear-gradient(135deg, #0d6efd, #20c997);
        padding-top: 80px;
        font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
    }

    /* main card */
    .password-card {
        background: #ffffff;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
        width: 450px;
        margin: auto;
    }

    /* text */
    td {
        padding: 15px;
        font-size: 16px;
        color: #0d6efd;
        font-weight: 500;
    }

    /* password box */
    input[type="password"] {
        width: 260px;
        padding: 12px;
        border-radius: 6px;
        border: 2px solid #20c997;
        font-size: 14px;
        outline: none;
        background: #f8f9fa;
    }

    /* focus effect */
    input[type="password"]:focus {
        border: 2px solid #0d6efd;
        box-shadow: 0px 0px 8px rgba(13, 110, 253, 0.3);
        background: white;
    }

    /* button */
    input[type="submit"] {
        background: linear-gradient(135deg, #0d6efd, #20c997);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }

    /* button hover */
    input[type="submit"]:hover {
        background: linear-gradient(135deg, #20c997, #0d6efd);
        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
    }

    table {
        width: 100%;
    }
</style>

<div class="page-wrapper">

    <form method="post">
        {% csrf_token %}

        <div class="password-card">

            <table align="center">

                <tr>
                    <td>Old Password</td>
                    <td>
                        <input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                            title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                            required name="txt_old">
                    </td>
                </tr>

                <tr>
                    <td>New Password</td>
                    <td>
                        <input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                            title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                            required name="txt_new">
                    </td>
                </tr>

                <tr>
                    <td>Confirm Password</td>
                    <td>
                        <input type="password" required name="txt_confirm">
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Change Password">
                    </td>
                </tr>

            </table>

        </div>

    </form>

</div>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location = "{% url 'Editor:MyProfile' %}";
</script>
{% elif msg1 %}
<script>
    alert("{{msg1}}");
</script>
{% endif %}

{% endblock %}
