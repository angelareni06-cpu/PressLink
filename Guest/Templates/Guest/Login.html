<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background:
            linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)),
            url("https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=1600&q=80");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        overflow: hidden;
    }

    form {
        background: rgba(255, 255, 255, 0.96);
        padding: 45px 35px;
        border-radius: 18px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
        animation: fadein 0.9s ease;
        width: 380px;
        border-top: 5px solid #d90429;
        position: relative;
    }

    form::before {
        content: "PRESSLINK LOGIN";
        display: block;
        text-align: center;
        font-size: 28px;
        font-weight: 700;
        color: #111;
        margin-bottom: 25px;
        letter-spacing: 1px;
    }

    form::after {
        content: "Secure access to your newsroom";
        display: block;
        text-align: center;
        font-size: 14px;
        color: #666;
        margin-top: -15px;
        margin-bottom: 25px;
    }

    @keyframes fadein {
        from {
            opacity: 0;
            transform: translateY(-25px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    table {
        border-collapse: collapse;
        width: 100%;
    }

    table,
    td {
        border: none;
    }

    tr {
        display: flex;
        flex-direction: column;
        margin-bottom: 18px;
    }

    td:first-child {
        color: #111;
        font-weight: 600;
        font-size: 15px;
        padding-bottom: 8px;
    }

    td:last-child {
        width: 100%;
    }

    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 13px 14px;
        border-radius: 10px;
        border: 1px solid #d1d1d1;
        outline: none;
        font-size: 15px;
        background: #f8f8f8;
        transition: all 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
        border: 1px solid #d90429;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(217, 4, 41, 0.12);
    }

    input[type="submit"] {
        margin-top: 10px;
        background: linear-gradient(to right, #111111, #d90429);
        color: white;
        border: none;
        padding: 13px 35px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s ease;
        width: 100%;
        letter-spacing: 0.5px;
    }

    input[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(217, 4, 41, 0.28);
    }

    @media (max-width: 480px) {
        form {
            width: 90%;
            padding: 35px 20px;
        }

        form::before {
            font-size: 22px;
        }
    }

    .back-link {
    position: absolute;
    top: 25px;
    left: 25px;
    color: white;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    background: rgba(0, 0, 0, 0.35);
    padding: 10px 18px;
    border-radius: 25px;
    transition: 0.3s ease;
    z-index: 10;
}

.back-link:hover {
    background: rgba(217, 4, 41, 0.9);
    transform: translateY(-2px);
}
</style>

</head>

<body>
    <a href="{% url 'Guest:index' %}" class="back-link">← Back</a>
    <form action="" method="post">
        {%csrf_token %}
        <table border="1" align="center">
            <tr>
                <td>Email</td>
                <td><input type="text" required name="txt_email" id="txt_email"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" required name="txt_password" id="txt_password"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Submit"></td>
            </tr>
        </table>
    </form>
</body>

</html>
