{% extends 'Guest/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporter Registration</title>

    <style>
        /* Page background */

        body {
            margin: 0;
            padding: 30px;

            font-family: Segoe UI;

            background: linear-gradient(to right, #e6f7ff, #ffffff, #e6fff2);
        }


        /* Form container */

        form {
            width: 600px;

            margin: auto;

            background: white;

            padding: 30px;

            border-radius: 12px;

            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }


        /* Table */

        table {
            width: 100%;

            border-collapse: collapse;
        }


        /* Labels */

        td:first-child {
            font-weight: bold;

            color: #0099cc;

            width: 200px;

            padding: 12px;
        }


        /* Fields */

        td:last-child {
            padding: 12px;
        }


        /* Inputs */

        input[type="text"],
        input[type="password"],
        input[type="date"],
        input[type="file"],
        select,
        textarea {
            width: 100%;

            padding: 10px;

            border-radius: 6px;

            border: 1px solid #b3e0ff;

            box-sizing: border-box;

            font-size: 14px;
        }


        /* textarea */

        textarea {
            height: 80px;

            resize: none;
        }


        /* radio */

        input[type="radio"] {
            margin-left: 10px;
        }


        /* focus */

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #66cc99;

            outline: none;

            box-shadow: 0 0 5px #ccffee;
        }


        /* button */

        input[type="submit"] {
            background: linear-gradient(to right, #66ccff, #66cc99);

            color: white;

            border: none;

            padding: 12px 35px;

            font-size: 16px;

            border-radius: 25px;

            cursor: pointer;

            margin-top: 10px;
        }


        /* hover */

        input[type="submit"]:hover {
            background: linear-gradient(to right, #33bbff, #33cc88);
        }


        /* remove border */

        table,
        td {
            border: none;
        }
    </style>

</head>

<body>
    <form action="" method="post" enctype="multipart/form-data">
        {%csrf_token %}
        <table border="1" align="center">
            <tr>
                <td>Name</td>
                <td><input type="text" required name="txt_name"
                        id="txt_name Allows Only Alphabets,Spaces and First Letter Must Be Capital Letter"
                        pattern="^[A-Z]+[a-zA-Z ]*$" /></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="text" required name="txt_email" id="txt_email"></td>
            </tr>
            <tr>
                <td>Contact</td>
                <td><input type="text" required name="txt_contact" id="txt_contact" pattern="[7-9]{1}[0-9]{9}"
                        title="Phone number with 7-9 and remaing 9 digit with 0-9"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td><input type="radio" required name="txt_gender" value="Male"> Male<input type="radio"
                        name="txt_gender" value="Female"> Female</td>
            </tr>
            <tr>
                <td>DOB</td>
                <td><input type="date" required name="txt_dob" id="txt_dob"></td>
            </tr>
            <tr>
                <td>Address</td>
                <td><textarea name="txt_address" id="txt_address" required></textarea></td>
            </tr>
            <tr>
                <td>District</td>
                <td><select name="sel_district" id="sel_district" required>
                        <option value="">---select---</option>
                        {% for i in district %}
                        <option value="{{i.id}}">{{i.district_name}}</option>
                        {% endfor %}
                    </select></td>
            </tr>
            <tr>
                <td>Place</td>
                <td><select name="sel_place" id="sel_place" required>
                        <option value="">---select---</option>
                    </select></td>
            </tr>
            <tr>
                <td>Photo</td>
                <td><input type="file" required name="file_photo" id="file_photo"></td>
            </tr>
            <tr>
                <td>Proof</td>
                <td><input type="file" required name="file_proof" id="file_proof"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                        title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                        required name="txt_password" id="txt_password"></td>
            </tr>
            <tr>
                <td>Confirm Password</td>
                <td><input type="password" required name="txt_confirm" id="txt_confirm"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Submit"></td>
            </tr>
        </table>
    </form>
</body>

</html>
{% if msg %}
<script>
    alert("{msg}")
    window.location = "{% url 'Guest:Reporter' %}";
</script>
{% endif %}

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    $("#sel_district").change(function () {
        var did = $(this).val();

        var ur = "{% url 'Guest:ajaxplace' %}"
        $.ajax({
            url: ur,
            data: { did: did, },
            success: function (data) {
                $("#sel_place").html(data);
            },
        });
    });
</script>

{% endblock %}
