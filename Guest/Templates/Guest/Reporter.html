{% extends 'Guest/Header.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporter Registration</title>

    <style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 50px 20px;
        font-family: "Segoe UI", sans-serif;
        min-height: 100vh;
        background:
            linear-gradient(to bottom, #111111 0, #111111 180px, #f5f5f7 180px, #f5f5f7 100%);
    }

    form {
        width: 760px;
        max-width: 100%;
        margin: auto;
        background: #ffffff;
        padding: 38px 32px;
        border-radius: 20px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.14);
        border: 1px solid #ececec;
        border-top: 6px solid #d90429;
        animation: fadeIn 0.8s ease;
        position: relative;
    }

    form::before {
        content: "REPORTER REGISTRATION";
        display: block;
        text-align: center;
        font-size: 31px;
        font-weight: 700;
        color: #111111;
        margin-bottom: 8px;
        letter-spacing: 1px;
    }

    form::after {
        content: "Join PressLink and start your newsroom journey";
        display: block;
        text-align: center;
        font-size: 14px;
        color: #6b6b6b;
        margin-bottom: 28px;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(24px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
    }

    table,
    td {
        border: none;
    }

    tr {
        border-bottom: 1px solid #f1f1f1;
    }

    td:first-child {
        width: 220px;
        padding: 14px 12px;
        font-size: 15px;
        font-weight: 600;
        color: #1c1c1c;
        vertical-align: top;
    }

    td:last-child {
        padding: 14px 12px;
    }

    input[type="text"],
    input[type="password"],
    input[type="date"],
    input[type="file"],
    select,
    textarea {
        width: 100%;
        padding: 13px 14px;
        font-size: 14px;
        border-radius: 12px;
        border: 1px solid #d9d9d9;
        background: #fafafa;
        transition: all 0.3s ease;
        outline: none;
    }

    textarea {
        min-height: 100px;
        resize: vertical;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="date"]:focus,
    input[type="file"]:focus,
    select:focus,
    textarea:focus {
        background: #fff;
        border-color: #d90429;
        box-shadow: 0 0 0 4px rgba(217, 4, 41, 0.10);
    }

    input[type="radio"] {
        margin-left: 10px;
        margin-right: 6px;
        accent-color: #d90429;
        transform: scale(1.05);
    }

    input[type="file"] {
        background: #fff;
        padding: 10px;
        cursor: pointer;
    }

    select {
        cursor: pointer;
    }

    input[type="submit"] {
        background: linear-gradient(90deg, #111111, #d90429);
        color: #fff;
        border: none;
        padding: 14px 42px;
        font-size: 16px;
        font-weight: 700;
        border-radius: 32px;
        cursor: pointer;
        transition: all 0.3s ease;
        width: 240px;
        letter-spacing: 0.6px;
    }

    input[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(217, 4, 41, 0.22);
    }

    input[type="submit"]:active {
        transform: translateY(0);
    }

    @media (max-width: 768px) {
        body {
            padding: 20px 12px;
            background: #f5f5f7;
        }

        form {
            padding: 24px 16px;
            border-radius: 16px;
        }

        form::before {
            font-size: 24px;
        }

        form::after {
            font-size: 13px;
        }

        tr {
            display: block;
            margin-bottom: 8px;
        }

        td:first-child,
        td:last-child {
            display: block;
            width: 100%;
            padding: 8px 6px;
        }

        input[type="submit"] {
            width: 100%;
        }
    }
</style>

</head>

<body>
    <form action="" method="post" enctype="multipart/form-data">
        {%csrf_token %}
        <table border="1" align="center">
            <tr>
                <td>Name</td>
                <td><input type="text" required name="txt_name"
                        id="txt_name Allows Only Alphabets,Spaces and First Letter Must Be Capital Letter"
                        pattern="^[A-Z]+[a-zA-Z ]*$" /></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="text" required name="txt_email" id="txt_email"></td>
            </tr>
            <tr>
                <td>Contact</td>
                <td><input type="text" required name="txt_contact" id="txt_contact" pattern="[7-9]{1}[0-9]{9}"
                        title="Phone number with 7-9 and remaing 9 digit with 0-9"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td><input type="radio" required name="txt_gender" value="Male"> Male<input type="radio"
                        name="txt_gender" value="Female"> Female</td>
            </tr>
            <tr>
                <td>DOB</td>
                <td><input type="date" required name="txt_dob" id="txt_dob"></td>
            </tr>
            <tr>
                <td>Address</td>
                <td><textarea name="txt_address" id="txt_address" required></textarea></td>
            </tr>
            <tr>
                <td>District</td>
                <td><select name="sel_district" id="sel_district" required>
                        <option value="">---select---</option>
                        {% for i in district %}
                        <option value="{{i.id}}">{{i.district_name}}</option>
                        {% endfor %}
                    </select></td>
            </tr>
            <tr>
                <td>Place</td>
                <td><select name="sel_place" id="sel_place" required>
                        <option value="">---select---</option>
                    </select></td>
            </tr>
            <tr>
                <td>Photo</td>
                <td><input type="file" required name="file_photo" id="file_photo"></td>
            </tr>
            <tr>
                <td>Proof</td>
                <td><input type="file" required name="file_proof" id="file_proof"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                        title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
                        required name="txt_password" id="txt_password"></td>
            </tr>
            <tr>
                <td>Confirm Password</td>
                <td><input type="password" required name="txt_confirm" id="txt_confirm"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><input type="submit" value="Submit"></td>
            </tr>
        </table>
    </form>
</body>

</html>
{% if msg %}
<script>
    alert("{msg}")
    window.location = "{% url 'Guest:Reporter' %}";
</script>
{% endif %}

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    $("#sel_district").change(function () {
        var did = $(this).val();

        var ur = "{% url 'Guest:ajaxplace' %}"
        $.ajax({
            url: ur,
            data: { did: did, },
            success: function (data) {
                $("#sel_place").html(data);
            },
        });
    });
</script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var today = new Date();
        var minAge = 18;
        var maxDate = new Date(today.getFullYear() - minAge, today.getMonth(), today.getDate());
        var maxDateString = maxDate.toISOString().split('T')[0];
        document.querySelector('input[name="txt_dob"]').setAttribute('max', maxDateString);
    });
</script>
{% endblock %}
